<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Registration | Kariakoo Sales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="public-page business-theme">
  <div class="register-container">
    <div class="register-card">
      <div class="register-header-new">
        <div class="register-icon-wrap">🏪</div>
        <h1>Business Registration</h1>
        <p>Join Kariakoo's digital marketplace</p>
      </div>
      
      <div class="flash" id="flash"></div>
      
      <form id="registerForm" class="form-grid-new">
        <div class="form-section-new">
          <h3 class="section-title">👤 Owner Information</h3>
          <div class="form-row-new">
            <input id="ownerName" placeholder="Full Name *" required>
            <input id="phone" type="tel" placeholder="Phone Number *" required pattern="[0-9]{10,}">
          </div>
          <div class="form-row-new">
            <input id="email" type="email" placeholder="Email (optional)">
            <input id="password" type="password" placeholder="Password *" required minlength="6">
          </div>
        </div>
        
        <div class="form-section-new">
          <h3 class="section-title">🏢 Business Information</h3>
          <div class="form-row-new">
            <input id="businessName" placeholder="Business Name *" required>
            <select id="businessType" required>
              <option value="">Business Type *</option>
              <option value="individual">Individual Trader</option>
              <option value="company">Registered Company</option>
            </select>
          </div>
          <div class="form-row-new">
            <select id="category">
              <option value="">Category (optional)</option>
              <option value="clothes">Clothes & Fashion</option>
              <option value="electronics">Electronics</option>
              <option value="food">Food & Beverages</option>
              <option value="wholesale">Wholesale</option>
              <option value="retail">Retail</option>
              <option value="other">Other</option>
            </select>
            <input id="street" placeholder="Street (optional)">
          </div>
          <textarea id="description" placeholder="Business Description (optional)" rows="2"></textarea>
        </div>
        
        <button class="btn btn-primary full-width register-submit" type="submit">Create Business Account</button>
      </form>
      
      <div class="register-footer-new">
        <p>Already have an account? <a href="login.html" class="bold">Login here</a></p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/session.js"></script>
  <script>
    const API_BASE = window.API_BASE || window.__APP_CONFIG__?.API_BASE || "http://127.0.0.1:8000";
  </script>
  <script>
    const form = document.getElementById("registerForm");
    const flash = document.getElementById("flash");

    function showFlash(type, message) {
      flash.className = `flash show ${type}`;
      flash.textContent = message;
      setTimeout(() => flash.className = "flash", 4000);
    }

    form?.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const payload = {
        owner_name: document.getElementById("ownerName").value.trim(),
        business_name: document.getElementById("businessName").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        email: document.getElementById("email").value.trim() || null,
        password: document.getElementById("password").value,
        business_type: document.getElementById("businessType").value,
        category: document.getElementById("category").value || null,
        description: document.getElementById("description").value.trim() || null,
        region: document.getElementById("region").value,
        area: document.getElementById("area").value || null,
        street: document.getElementById("street").value.trim() || null,
        shop_number: document.getElementById("shopNumber").value.trim() || null,
        role: "seller" // Business accounts are always sellers
      };

      if (!payload.owner_name || !payload.business_name || !payload.phone || !payload.password || !payload.business_type) {
        showFlash("error", "Please fill all required fields");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/business/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.detail || "Registration failed");
        
        setSession(data.token, { ...data.user, role: data.user?.role || "seller" }, "business");
        
        showFlash("success", "Business account created! Redirecting...");
        setTimeout(() => window.location.href = "index.html", 1500);
      } catch (err) {
        showFlash("error", err.message);
      }
    });
  </script>
</body>
</html>
