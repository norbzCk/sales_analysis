<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver/Rider Registration | Kariakoo Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="public-page logistics-theme">
  <div class="register-container">
    <div class="register-card">
      <div class="register-header-new">
        <div class="register-icon-wrap">🛵</div>
        <h1>Join as Delivery Partner</h1>
        <p>Deliver goods across Dar es Salaam</p>
      </div>
      
      <div class="flash" id="flash"></div>
      
      <form id="registerForm" class="form-grid-new">
        <div class="form-section-new">
          <h3 class="section-title">👤 Personal Information</h3>
          <div class="form-row-new">
            <input id="name" placeholder="Full Name *" required>
            <input id="phone" type="tel" placeholder="Phone Number *" required pattern="[0-9]{10,}">
          </div>
          <div class="form-row-new">
            <input id="email" type="email" placeholder="Email (optional)">
            <input id="password" type="password" placeholder="Password *" required minlength="6">
          </div>
        </div>
        
        <div class="form-section-new">
          <h3 class="section-title">🚚 Vehicle Information</h3>
          <div class="form-row-new">
            <select id="accountType" required>
              <option value="">Account Type *</option>
              <option value="individual">Individual (Bodaboda/Rider)</option>
              <option value="company">Delivery Company</option>
            </select>
            <select id="vehicleType" required>
              <option value="">Vehicle Type *</option>
              <option value="motorcycle">Motorcycle 🛵</option>
              <option value="car">Car 🚗</option>
              <option value="van">Van 🚐</option>
              <option value="truck">Truck 🚛</option>
            </select>
          </div>
          <div class="form-row-new">
            <input id="plateNumber" placeholder="Plate Number (optional)">
            <select id="baseArea">
              <option value="">Base Area</option>
              <option value="Kariakoo">Kariakoo</option>
              <option value="Ilala">Ilala</option>
              <option value="Kinondoni">Kinondoni</option>
              <option value="Ubungo">Ubungo</option>
              <option value="Kigamboni">Kigamboni</option>
            </select>
          </div>
        </div>
        
        <button class="btn btn-primary full-width register-submit" type="submit">Register as Delivery Partner</button>
      </form>
      
      <div class="register-footer-new">
        <p>Already a partner? <a href="login.html" class="bold">Login here</a></p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/session.js"></script>
  <script>
    const API_BASE = window.API_BASE || window.__APP_CONFIG__?.API_BASE || "http://127.0.0.1:8000";
    const form = document.getElementById("registerForm");
    const flash = document.getElementById("flash");

    function showFlash(type, message) {
      flash.className = `flash show ${type}`;
      flash.textContent = message;
      setTimeout(() => flash.className = "flash", 4000);
    }

    form?.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const payload = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        email: document.getElementById("email").value.trim() || null,
        password: document.getElementById("password").value,
        account_type: document.getElementById("accountType").value,
        vehicle_type: document.getElementById("vehicleType").value,
        plate_number: document.getElementById("plateNumber").value.trim() || null,
        license_number: document.getElementById("licenseNumber").value.trim() || null,
        base_area: document.getElementById("baseArea").value || null,
        coverage_areas: document.getElementById("coverageAreas").value.trim() || null
      };

      if (!payload.name || !payload.phone || !payload.password || !payload.account_type || !payload.vehicle_type) {
        showFlash("error", "Please fill all required fields");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/logistics/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.detail || "Registration failed");
        
        setSession(data.token, { ...data.user, role: "logistics" }, "logistics");
        
        showFlash("success", "Registration successful! Redirecting...");
        setTimeout(() => window.location.href = "logistics-dashboard.html", 1500);
      } catch (err) {
        showFlash("error", err.message);
      }
    });
  </script>
</body>
</html>
