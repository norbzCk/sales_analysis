<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | SalesSys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">SalesSys</div>
      <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a class="active" href="products.html">Products</a></li>
        <li><a href="orders.html">Orders</a></li>
        <li><a href="customers.html">Customers</a></li>
        <li><a href="sales.html">Sales</a></li>
      </ul>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 class="page-title">Products</h1>
          <p class="page-subtitle">Manage inventory with quick add and delete actions.</p>
        </div>
      </header>

      <div class="flash" id="productFlash"></div>

      <section class="card">
        <h2 class="section-title">Add Product</h2>
        <form id="productForm" class="form-grid">
          <input id="name" placeholder="Product name" required>
          <input id="category" placeholder="Category" required>
          <input id="price" type="number" step="0.01" placeholder="Unit price" required>
          <input id="stock" type="number" step="1" min="0" placeholder="Stock" required>
          <input id="description" placeholder="Description">
          <button class="btn btn-primary" type="submit">Save Product</button>
        </form>
      </section>

      <section class="card" style="margin-top: 18px;">
        <h2 class="section-title">Product Catalog</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Description</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="product-list"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/products.js"></script>
</body>
</html>
