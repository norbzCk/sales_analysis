<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users | Kariakoo Sales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Kariakoo Sales</div>
      <ul class="nav-links">
  <li><a data-role-only="user" href="customer-dashboard.html">Dashboard</a></li>
  <li><a data-role-min="admin" href="index.html">Business Dashboard</a></li>
  <li><a href="products.html">Products</a></li>
  <li><a data-role-min="admin" href="providers.html">Providers</a></li>
  <li><a href="orders.html">Orders</a></li>
  <li><a data-role-only="user" href="payments.html">Payments</a></li>
  <li><a data-role-only="user" href="profile.html">Profile</a></li>
  <li><a data-role-min="super_admin" href="customers.html">Customers</a></li>
  <li><a data-role-min="super_admin" href="sales.html">Sales</a></li>
  <li><a class="active" data-role-min="admin" href="users.html">Users</a></li>
</ul>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 class="page-title">User Administration</h1>
          <p class="page-subtitle">Create and review user accounts and access levels.</p>
        </div>
        <div class="topbar-actions">
          <span class="user-pill" id="currentUserLabel">-</span>
          <button class="btn btn-secondary" id="logoutBtn" type="button">Logout</button>
        </div>
      </header>

      <div class="flash" id="usersFlash"></div>

      <section class="card" data-role-min="admin">
        <h2 class="section-title">Create User</h2>
        <form id="userForm" class="form-grid">
          <input id="name" placeholder="Full name" required>
          <input id="email" type="email" placeholder="Email" required>
          <input id="password" type="password" placeholder="Password (8+ chars)" required>
          <select id="role" required>
            <option value="user">user</option>
            <option value="admin">admin</option>
            <option value="super_admin">super_admin</option>
            <option value="owner">owner</option>
          </select>
          <button class="btn btn-primary" type="submit">Create User</button>
        </form>
      </section>

      <section class="card" style="margin-top: 18px;">
        <h2 class="section-title">User List</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="usersTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/session.js"></script>
  <script src="js/users.js"></script>
</body>
</html>
