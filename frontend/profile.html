<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | SalesSys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">SalesSys</div>
      <ul class="nav-links">
        <li><a data-role-only="user" href="customer-dashboard.html">Dashboard</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="orders.html">My Orders</a></li>
        <li><a data-role-only="user" href="payments.html">Payments</a></li>
        <li><a class="active" data-role-only="user" href="profile.html">Profile</a></li>
        <li><a data-role-min="admin" href="index.html">Business Dashboard</a></li>
        <li><a data-role-only="super_admin" href="customers.html">Customers</a></li>
        <li><a data-role-only="super_admin" href="sales.html">Sales</a></li>
        <li><a data-role-min="admin" href="users.html">Users</a></li>
      </ul>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 class="page-title">My Profile</h1>
          <p class="page-subtitle">Update your personal details and password.</p>
        </div>
        <div class="topbar-actions">
          <span class="user-pill" id="currentUserLabel">-</span>
          <button class="btn btn-secondary" id="logoutBtn" type="button">Logout</button>
        </div>
      </header>

      <div class="flash" id="profileFlash"></div>

      <section class="card">
        <h2 class="section-title">Profile Details</h2>
        <form id="profileForm" class="form-grid">
          <input id="profileName" placeholder="Full name" required>
          <input id="profileEmail" placeholder="Email" disabled>
          <input id="profilePhone" placeholder="Phone number">
          <input id="profileAddress" placeholder="Address">
          <button class="btn btn-primary" type="submit">Save Changes</button>
        </form>
      </section>

      <section class="card" style="margin-top: 18px;">
        <h2 class="section-title">Change Password</h2>
        <form id="passwordForm" class="form-grid">
          <input id="currentPassword" type="password" placeholder="Current password" required>
          <input id="newPassword" type="password" placeholder="New password (8+ chars)" required>
          <input id="confirmPassword" type="password" placeholder="Confirm new password" required>
          <button class="btn btn-primary" type="submit">Update Password</button>
        </form>
      </section>
    </main>
  </div>

  <script src="js/session.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
