<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Kariakoo Sales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="login-clean-container">
    <div class="login-card-new">
      <div class="login-card-header">
        <img src="salesLOGO.png" alt="Kariakoo" class="login-logo-small">
        <h1>Welcome Back</h1>
        <p>Login to your account to continue</p>
      </div>

      <div class="flash" id="loginFlash"></div>

      <form class="login-form-new" id="loginForm">
        <div class="input-group-new">
          <span class="material-symbols-outlined icon">person</span>
          <input id="loginIdentifier" type="text" placeholder="Phone number or Email" autocomplete="off" required>
        </div>
        
        <div class="input-group-new">
          <span class="material-symbols-outlined icon">lock</span>
          <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" required>
          <button type="button" class="password-toggle" id="togglePassword">
            <span class="material-symbols-outlined" id="toggleIcon">visibility</span>
          </button>
        </div>

        <button class="btn btn-primary full-width" type="submit" id="loginBtn">Sign In</button>
      </form>

      <div class="login-footer-new">
        <p>Don't have an account? <a href="customer-register.html" class="bold">Join as Customer</a></p>
        <div class="partner-links">
          <span>Other ways to join:</span>
          <a href="business-register.html">Sell on Kariakoo</a>
          <span class="dot">·</span>
          <a href="logistics-register.html">Delivery Partner</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/session.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const flash = document.getElementById("loginFlash");
    const loginBtn = document.getElementById("loginBtn");
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("loginPassword");
    const toggleIcon = document.getElementById("toggleIcon");

    const API_BASE = window.API_BASE || window.__APP_CONFIG__?.API_BASE || "http://127.0.0.1:8000";

    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      toggleIcon.textContent = type === "password" ? "visibility" : "visibility_off";
    });

    function showFlash(type, message) {
      flash.className = `flash show ${type}`;
      flash.textContent = message;
      setTimeout(() => flash.className = "flash", 4000);
    }

    function getWelcomeForUser(user, role) {
      const names = {
        admin: "Administrator",
        seller: user?.business_name || user?.owner_name || "Business Owner",
        logistics: user?.name || "Driver",
        customer: user?.name || "Shopper"
      };
      return `Welcome back, ${names[role] || names.customer}!`;
    }

    form?.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const identifier = document.getElementById("loginIdentifier").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!identifier || !password) {
        showFlash("error", "Please enter your credentials");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";

      const isEmail = identifier.includes('@');
      const identifierField = isEmail ? "email" : "phone";
      
      const loginAttempts = [
        { url: "/business/login", userType: "business", role: "seller" },
        { url: "/logistics/login", userType: "logistics", role: "logistics" },
        { url: "/auth/login", userType: "user", role: "user" }
      ];

      let lastError = "Invalid credentials";

      for (const attempt of loginAttempts) {
        try {
          const payload = { password: password };
          if (identifierField === 'email' && identifier.includes('@')) {
            payload.email = identifier.toLowerCase();
          } else {
            payload.phone = identifier;
          }

          console.log('Trying login at:', API_BASE + attempt.url, 'with payload:', payload);

          const res = await fetch(`${API_BASE}${attempt.url}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          const text = await res.text();
          console.log('Response status:', res.status, 'text:', text);
          
          if (!text || text.trim() === "") {
            lastError = "Server returned empty response";
            continue;
          }

          let data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            console.log('JSON parse error:', e);
            lastError = "Invalid server response - please try again";
            continue;
          }

          if (res.ok) {
            const token = data.token || data.access_token;
            const user = data.user || data;
            const merged = { ...user, role: user.role || attempt.role };
            setSession(token, merged, attempt.userType);
            
            const welcomeMsg = getWelcomeForUser(user, attempt.role);
            showFlash("success", welcomeMsg);
            redirectToPostLogin(merged);
            return;
          }
          
          lastError = data.detail || "Login failed";
        } catch (err) {
          lastError = err.message || "Connection error";
        }
      }

      loginBtn.disabled = false;
      loginBtn.textContent = "Sign In";
      showFlash("error", lastError);
    });
  </script>
</body>
</html>
