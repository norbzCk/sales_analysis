<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders | SalesSys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">SalesSys</div>
      <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a class="active" href="orders.html">Orders</a></li>
        <li><a href="customers.html">Customers</a></li>
        <li><a href="sales.html">Sales</a></li>
      </ul>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 class="page-title">Orders</h1>
          <p class="page-subtitle">Create and track fulfilled orders.</p>
        </div>
      </header>

      <div class="flash" id="orderFlash"></div>

      <section class="card">
        <h2 class="section-title">Create Order</h2>
        <form id="orderForm" class="form-grid">
          <input id="order_date" type="date" required>
          <input id="product" placeholder="Product name" required>
          <input id="category" placeholder="Category" required>
          <input id="quantity" type="number" step="1" min="1" placeholder="Quantity" required>
          <input id="unit_price" type="number" step="0.01" min="0" placeholder="Unit price" required>
          <button class="btn btn-primary" type="submit">Create Order</button>
        </form>
      </section>

      <section class="card" style="margin-top: 18px;">
        <h2 class="section-title">Recent Orders</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Product</th>
                <th>Category</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="orderTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/orders.js"></script>
</body>
</html>
