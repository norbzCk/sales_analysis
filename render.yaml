services:
  - type: web
    name: sales-analysis-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
